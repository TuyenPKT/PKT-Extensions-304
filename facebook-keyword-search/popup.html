<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>PKT Facebook Search</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>PKT Facebook Search</h1>

    <div class="file-section">
      <button class="btn-file" id="btnFile">📄 Chọn file từ khóa (.txt)</button>
      <input type="file" id="fileInput" accept=".txt" hidden>
      <div id="fileInfo" class="file-info">Chưa chọn file</div>
    </div>

    <div class="settings">
      <label>
        Delay giữa tìm kiếm (giây):
        <input type="number" id="delayInput" value="3" min="1" max="60">
      </label>
    </div>

    <div class="controls">
      <button id="btnStart" disabled>▶ Bắt đầu</button>
      <button id="btnPause" disabled>⏸ Tạm dừng</button>
      <button id="btnStop" disabled>⏹ Dừng</button>
      <button id="btnDownload" disabled>⬇ Tải log</button>
    </div>

    <div id="loginWarning" class="warning" style="display:none">
      ⚠️ Facebook yêu cầu đăng nhập. Hãy đăng nhập rồi nhấn Tiếp tục.
      <button id="btnResume" class="btn-resume">▶ Tiếp tục</button>
    </div>

    <div class="progress-section" id="progressSection" style="display:none">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">0 / 0</div>
    </div>

    <div class="stats" id="statsSection" style="display:none">
      <span class="stat-found">✅ Thấy: <strong id="foundCount">0</strong></span>
      <span class="stat-miss">❌ Không thấy: <strong id="missCount">0</strong></span>
    </div>

    <div class="log-list" id="logList"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
